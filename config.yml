kb_answer_provider: azure_openai
action_agent_provider: azure_openai
action_extraction_provider: azure_openai

embedding_provider: gemini

azure_openai:
  api_key: your_azure_openai_api_key_here
  endpoint: https://your-resource-name.openai.azure.com
  chat_deployment: your_chat_deployment_name
  api_version: 2024-02-01

gemini:
  api_key: your_gemini_api_key_here
  chat_model: gemini-2.5-flash
  embedding_model: gemini-embedding-001
  min_request_interval_seconds: 1.0

openai:
  api_key: your_openai_api_key_here
  chat_model: gpt-4o-mini
  embedding_model: text-embedding-3-small

qdrant:
  collection: customer_care_kb
  embedding_dimension: 1536
  distance: cosine
  path: vector_db/qdrant/data/local
  url:
  api_key:
  prefer_grpc: false

qdrant_document_collection: customer_care_documents_kb
faqs_jsonl_path: cob_mock_kb_large/high_quality_faqs/high_quality_faqs.jsonl
documents_manifest_path: cob_mock_kb_large/high_quality_documents/documents_manifest.json
faq_pipeline_batch_size: 3
document_pipeline_batch_size: 16
